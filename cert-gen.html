<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Studio | Tech Wizard 2.0</title>
    <script>
        // Simple security check for ?admin=true
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') !== 'true') {
            window.location.href = 'index.html'; // Redirect unauthorized users
        }
    </script>
    <!-- pdf-lib is a powerful library to modify PDFs in the browser -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- JSZip for bulk bundling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- fontkit is required for embedding custom fonts in pdf-lib -->
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d78;
            --neon-cyan: #00f5ff;
            --dark-bg: #050510;
            --dark-card: #0d0d2b;
            --text-primary: #f0eeff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: var(--dark-card);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(180, 79, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--neon-pink);
            font-size: 0.9rem;
        }

        input[type="file"], textarea, input[type="range"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }

        textarea {
            height: 150px;
            resize: vertical;
            font-family: 'Poppins', sans-serif;
        }

        .preview-pane {
            background: #1a1a3a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 1);
            background: white;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
        }

        .btn-primary:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .style-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .style-btn.active {
            background: var(--neon-cyan);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .style-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        input[type="text"]#font-choice {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 Certificate <span style="color:#fff">Studio</span></h1>

        <div class="studio-grid">
            <!-- Left Side: Controls -->
            <div class="controls">
                <div class="control-group">
                    <label>1. Select Certificate Template (PDF)</label>
                    <input type="file" id="pdf-upload" accept="application/pdf">
                </div>

                <div class="control-group">
                    <label>2. Enter Participant Names (One per line)</label>
                    <textarea id="name-list" placeholder="John Doe&#10;Jane Smith&#10;Alice Johnson"></textarea>
                </div>

                <div class="control-group">
                    <label>3. Font Style (Type to Search)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="font-choice" list="popular-fonts" value="Poppins" placeholder="Search Google Fonts...">
                        <datalist id="popular-fonts">
                            <option value="Poppins">
                            <option value="Montserrat">
                            <option value="Roboto">
                            <option value="Open Sans">
                            <option value="Playfair Display">
                            <option value="Lora">
                            <option value="Oswald">
                            <option value="Raleway">
                            <option value="Merriweather">
                            <option value="Ubuntu">
                            <option value="Inter">
                            <option value="Lato">
                            <option value="Work Sans">
                            <option value="Pacifico">
                            <option value="Great Vibes">
                            <option value="Dancing Script">
                            <option value="Bebas Neue">
                            <option value="Abril Fatface">
                            <option value="Quicksand">
                            <option value="Caveat">
                            <option value="Satisfy">
                        </datalist>
                        <button id="toggle-bold" class="style-btn" title="Bold">B</button>
                        <button id="toggle-italic" class="style-btn" title="Italic">I</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>4. Font Color</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="color" id="font-color" value="#000000" style="width: 50px; height: 40px; cursor: pointer; padding: 2px;">
                        <input type="text" id="font-color-hex" value="#000000" placeholder="#000000" style="width: 100px; text-transform: uppercase;">
                    </div>
                </div>

                <div class="control-group">
                    <label>5. Vertical Position (Y)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="range" id="y-pos" min="0" max="1000" value="450">
                        <input type="number" id="y-pos-num" min="0" max="1000" value="450" style="width:70px;">
                    </div>
                </div>

                <div class="control-group">
                    <label>6. Horizontal Offset (X)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="range" id="x-pos" min="-500" max="500" value="0">
                        <input type="number" id="x-pos-num" min="-500" max="500" value="0" style="width:70px;">
                    </div>
                </div>

                <div class="control-group">
                    <label>7. Font Size</label>
                    <div style="display:flex; gap:10px;">
                        <input type="range" id="font-size" min="10" max="150" value="45">
                        <input type="number" id="font-size-num" min="10" max="150" value="45" style="width:70px;">
                    </div>
                </div>
            </div>

            <!-- Right Side: Preview -->
            <div class="preview-pane" id="preview-boundary">
                <canvas id="preview-canvas"></canvas>
                <div id="loading-overlay" style="display:none; position:absolute; background:rgba(0,0,0,0.7); width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    Rendering Preview...
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button id="generate-btn" class="btn btn-primary" disabled>Generate & Download All PDFs</button>
        </div>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const upload = document.getElementById('pdf-upload');
        const generateBtn = document.getElementById('generate-btn');
        const nameList = document.getElementById('name-list');
        const canvas = document.getElementById('preview-canvas');
        const status = document.getElementById('status');

        const ySlider = document.getElementById('y-pos');
        const yNum = document.getElementById('y-pos-num');
        const xSlider = document.getElementById('x-pos');
        const xNum = document.getElementById('x-pos-num');
        const sizeSlider = document.getElementById('font-size');
        const sizeNum = document.getElementById('font-size-num');

        function syncInput(slider, num) {
            slider.addEventListener('input', () => {
                num.value = slider.value;
                updatePreview();
            });
            num.addEventListener('input', () => {
                slider.value = num.value;
                updatePreview();
            });
        }

        syncInput(ySlider, yNum);
        syncInput(xSlider, xNum);
        syncInput(sizeSlider, sizeNum);

        let templateBytes = null;
        let pdfDoc = null;
        let poppinsFont = null;

        const fontChoice = document.getElementById('font-choice');
        const fontColor = document.getElementById('font-color');
        const fontColorHex = document.getElementById('font-color-hex');
        
        const toggleBold = document.getElementById('toggle-bold');
        const toggleItalic = document.getElementById('toggle-italic');

        let isBold = true; // Bold by default for better looks
        let isItalic = false;

        toggleBold.classList.toggle('active', isBold);
        toggleBold.onclick = () => { isBold = !isBold; toggleBold.classList.toggle('active', isBold); updatePreview(); };
        toggleItalic.onclick = () => { isItalic = !isItalic; toggleItalic.classList.toggle('active', isItalic); updatePreview(); };

        // Sync visual color picker with HEX text input
        fontColor.addEventListener('input', () => {
            fontColorHex.value = fontColor.value.toUpperCase();
            updatePreview();
        });
        fontColorHex.addEventListener('input', () => {
            const hex = fontColorHex.value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                fontColor.value = hex;
                updatePreview();
            }
        });

        // Helpers
        function hexToPdfRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return rgb(r, g, b);
        }

        // Professional Font Fetching Engine
        async function loadFont() {
            try {
                const baseName = fontChoice.value.trim();
                const cleanName = baseName.replace(/\s+/g, '');
                const repoPath = baseName.toLowerCase().replace(/\s+/g, '');

                // Determine weight and style suffix
                let stylePart = "";
                if (isBold && isItalic) stylePart = "BoldItalic";
                else if (isBold) stylePart = "Bold";
                else if (isItalic) stylePart = "Italic";
                else stylePart = (baseName === "Poppins" || baseName === "Roboto") ? "Medium" : "Regular";

                // Using JSDelivr CDN for better CORS support (removes "Failed to Fetch" errors)
                const fontUrl = `https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/${repoPath}/${cleanName}-${stylePart}.ttf`;
                
                status.innerText = `Connecting to Font Library: ${baseName}...`;
                const fontBytes = await fetch(fontUrl).then(res => {
                    if (!res.ok) throw new Error("This specific style (Bold/Italic) is not available for this font.");
                    return res.arrayBuffer();
                });
                status.innerText = `Font Engine: ${baseName} ${stylePart} Loaded successfully!`;
                return fontBytes;
            } catch (e) {
                console.warn(e);
                status.innerText = "Style not found. Falling back to Poppins for stability.";
                // Permanent Fallback: Poppins Medium (Very stable)
                return await fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/poppins/Poppins-Medium.ttf').then(res => res.arrayBuffer());
            }
        }

        upload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                templateBytes = await file.arrayBuffer();
                generateBtn.disabled = false;
                status.innerText = "Template '" + file.name + "' uploaded.";
                updatePreview();
            }
        });

        async function updatePreview() {
            if (!templateBytes) return;
            const names = nameList.value.split('\n').filter(n => n.trim() !== "");
            const testName = names.length > 0 ? names[0] : "SAMPLE NAME";

            try {
                // Ignore encryption and use a more flexible loading strategy
                const pdfDoc = await PDFDocument.load(templateBytes, { ignoreEncryption: true });
                pdfDoc.registerFontkit(fontkit);
                
                const fontBytes = await loadFont();
                let customFont = fontBytes ? await pdfDoc.embedFont(fontBytes) : null;

                const pages = pdfDoc.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();
                const fontSize = parseInt(sizeSlider.value);
                const xOffset = parseInt(xSlider.value);
                const yPos = parseInt(ySlider.value);
                const textColor = hexToPdfRgb(fontColor.value);

                const textWidth = customFont ? customFont.widthOfTextAtSize(testName, fontSize) : testName.length * (fontSize * 0.5);
                const centerX = (width / 2) - (textWidth / 2) + xOffset;

                firstPage.drawText(testName, {
                    x: centerX,
                    y: height - yPos,
                    size: fontSize,
                    font: customFont,
                    color: textColor,
                });

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(blob);
                
                renderViaIframe(blobUrl);
                status.innerText = "System: Template rendering successful.";
            } catch (error) {
                console.error(error);
                status.innerText = "System Error: " + error.message;
            }
        }

        function renderViaIframe(url) {
            const boundary = document.getElementById('preview-boundary');
            // Revoke old URL to save memory
            const oldIframe = boundary.querySelector('iframe');
            if (oldIframe && oldIframe.src.startsWith('blob:')) {
                URL.revokeObjectURL(oldIframe.src);
            }
            boundary.innerHTML = `<iframe src="${url}" style="width:100%; height:500px; border:none; border-radius:12px;"></iframe>`;
        }

        [ySlider, xSlider, sizeSlider, nameList, fontChoice].forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(window.previewTimeout);
                window.previewTimeout = setTimeout(updatePreview, 500);
            });
        });

        generateBtn.addEventListener('click', async () => {
            const names = nameList.value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) return alert("Enter names.");

            status.innerText = "Preparing " + names.length + " items...";
            generateBtn.disabled = true;
            const zip = new JSZip();

            try {
                const fontBytes = await loadFont();
                const textColor = hexToPdfRgb(fontColor.value);
                
                for (let i = 0; i < names.length; i++) {
                    const name = names[i];
                    status.innerText = `Processing: ${i+1}/${names.length} - ${name}`;

                    const tempDoc = await PDFDocument.load(templateBytes, { ignoreEncryption: true });
                    tempDoc.registerFontkit(fontkit);
                    const customFont = fontBytes ? await tempDoc.embedFont(fontBytes) : null;

                    // ADD OFFICIAL METADATA TO PREVENT SECURITY WARNINGS
                    tempDoc.setTitle(`Tech Wizard 2.0 Certificate - ${name}`);
                    tempDoc.setCreator('Tech Wizard 2.0 - Certificate Studio');
                    tempDoc.setProducer('Tech Wizard 2.0');
                    tempDoc.setCreationDate(new Date());
                    tempDoc.setModificationDate(new Date());

                    const page = tempDoc.getPages()[0];
                    const { width, height } = page.getSize();
                    const fontSize = parseInt(sizeSlider.value);
                    const xOffset = parseInt(xSlider.value);
                    const yPos = parseInt(ySlider.value);

                    const textWidth = customFont ? customFont.widthOfTextAtSize(name, fontSize) : name.length * (fontSize * 0.5);
                    const centerX = (width / 2) - (textWidth / 2) + xOffset;

                    page.drawText(name, {
                        x: centerX,
                        y: height - yPos,
                        size: fontSize,
                        font: customFont,
                        color: textColor,
                    });

                    const pdfBytes = await tempDoc.save();
                    zip.file(`Cert_${name.replace(/\s+/g, '_')}.pdf`, pdfBytes);
                }
                
                status.innerText = "Building ZIP...";
                const zipBlob = await zip.generateAsync({type: "blob"});
                download(zipBlob, "TechWizard_Certificates.zip", "application/zip");
                status.innerText = "Bulk Download Ready!";
            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
            } finally {
                generateBtn.disabled = false;
            }
        });

        // Trigger file download
        function download(data, filename, type) {
            const file = new Blob([data], { type: type });
            const a = document.createElement("a"),
                    url = URL.createObjectURL(file);
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(function() {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 0);
        }

    </script>
</body>
</html>
